<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Catalogue</title>
</head>
<body>

<h1>Catalogue</h1>

<div>
    {% for item in items %}
        <div style="border:1px solid #ccc; padding:10px; margin:10px;">
            <h2>{{ item.name }}</h2>
            <p>Prix : {{ item.price }} €</p>

            <form method="post" action="{% url 'catalogue' %}">
                {% csrf_token %}

                <input type="hidden" name="id" value="{{ item.id }}">

                <button type="submit">Payer</button>
            </form>
        </div>
    {% endfor %}
</div>

</body>
</html>
