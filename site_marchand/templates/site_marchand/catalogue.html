<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Catalogue</title>
</head>
<body>

<h1>Catalogue</h1>

<div>
    {% for produit in produits %}
        <div style="border:1px solid #ccc; padding:10px; margin:10px;">
            <h2>{{ produit.nom }}</h2>
            <p>Prix : {{ produit.prix }} €</p>

            <a href="/payer/{{ produit.id }}/">
                <button>Payer</button>
            </a>
        </div>
    {% endfor %}
</div>

</body>
</html>
